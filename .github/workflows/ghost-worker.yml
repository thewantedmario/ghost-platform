name: Ghost Worker - Auto Tool Generator
name: Ghost Worker - Full Automation

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write         # CRITICAL: Allows the robot to save tools & homepage
  pages: write            # CRITICAL: Allows the robot to push changes to GitHub Pages
  id-token: write         # CRITICAL: Allows the robot to use the GitHub API
  pull-requests: write


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-genai requests

      - name: 1. Research Trends (Scrapingdog)
        run: python scripts/trend_analyzer.py

      - name: 2. Generate Tool Pages (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_tools.py

      - name: 3. Update Homepage Grid
        run: python scripts/update_homepage.py

      - name: 4. Push Changes to Live Site
        run: |
          git config --global user.name "GhostWorker"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Sunday Auto-Update: New tools & updated homepage [skip ci]" || echo "No changes"
          git push